name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - run: npm ci

      - name: Biome (lint + format)
        run: npx biome check

      - name: TypeScript
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test:run

      - name: Build
        run: npm run build
